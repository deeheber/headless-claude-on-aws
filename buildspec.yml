version: 0.2

env:
  shell: bash
  secrets-manager:
    ANTHROPIC_API_KEY: cfn-investigator/anthropic-key
    GITHUB_TOKEN: cfn-investigator/github-token

phases:
  install:
    runtime-versions:
      nodejs: 24
      python: 3.13
    commands:
      - npm install -g @anthropic-ai/claude-code@2.1.143
      - pip install uv==0.11.14
      # Log tool versions for debugging.
      - claude --version
      - uv --version

  pre_build:
    commands:
      - ': "${STACK_NAME:?STACK_NAME is required (pass via --environment-variables-override)}"'
      # Profile that .mcp.json resolves via AWS_PROFILE=investigator.
      # The SDK assumes the read-only role on demand.
      - |
        mkdir -p ~/.aws
        cat > ~/.aws/config <<EOF
        [profile investigator]
        role_arn = ${INVESTIGATOR_ROLE_ARN}
        credential_source = EcsContainer
        region = ${AWS_REGION}
        EOF
      # If REPO and COMMIT_SHA are provided, pre-fetch commit metadata.
      # Patches are stripped here so a large commit doesn't flood the context window.
      - |
        if [ -n "${REPO:-}" ] && [ -n "${COMMIT_SHA:-}" ]; then
          echo "Pre-fetching commit metadata for ${REPO}@${COMMIT_SHA}..."
          gh api "repos/${REPO}/commits/${COMMIT_SHA}" \
            --jq '{sha, message: .commit.message, author: .commit.author.name, date: .commit.author.date, url: .html_url, files: [.files[] | {filename, status, additions, deletions}]}' \
            > /tmp/commit-metadata.json \
            || echo '{"error": "commit fetch failed - see gh stderr above"}' > /tmp/commit-metadata.json
        else
          echo "No REPO/COMMIT_SHA provided; agent will run without commit context."
          echo '{}' > /tmp/commit-metadata.json
        fi

  build:
    commands:
      - set -euo pipefail
      - |
        {
          printf '%s\n' "Investigate the failing CloudFormation stack: $STACK_NAME"
          printf '\n%s\n' "Commit context (may be empty if not provided):"
          printf '```json\n'
          cat /tmp/commit-metadata.json
          printf '```\n'
        } > /tmp/user-message.md
      - |
        claude -p --model sonnet \
          --permission-mode dontAsk \
          --strict-mcp-config \
          --mcp-config ./.mcp.json \
          --append-system-prompt-file ./system-prompt.md \
          --allowedTools \
            "Bash(*)" \
            "mcp__aws-mcp" \
          --max-turns 40 \
          --max-budget-usd 5 \
          --output-format stream-json \
          --verbose \
          < /tmp/user-message.md \
          | tee /tmp/output.jsonl
      # Prefer the final "result" event. Fall back to the trailing assistant
      # text if the run was cut short by --max-turns or --max-budget-usd.
      - |
        jq -r 'select(.type=="result") | .result' /tmp/output.jsonl > /tmp/output.txt || true
        if [ ! -s /tmp/output.txt ]; then
          jq -r 'select(.type=="assistant") | .message.content[]? | select(.type=="text") | .text' /tmp/output.jsonl \
            | tail -n 200 > /tmp/output.txt || true
        fi

  post_build:
    commands:
      - |
        if [ "${CODEBUILD_BUILD_SUCCEEDING:-1}" = "1" ] && [ -s /tmp/output.txt ]; then
          echo "===== Investigator analysis ====="
          cat /tmp/output.txt
          echo "===== End analysis ====="
          # To forward this analysis to Slack/Discord/Teams/SNS/SES/etc., POST it to your service of choice here.
        else
          echo "❌ Investigation failed, see ${CODEBUILD_BUILD_URL:-the CodeBuild console}"
        fi
